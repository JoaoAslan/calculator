<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <div class="content-box">
        <div class="screen">
            <div class="count">to be added!</div>
            <div class="result">version 0.1</div>
        </div>
        <table class="buttons">
            <tr>
                <td><button class="special" id="delete">AC</button>
                <td><button class="digit">%</button></td>
                <td><button class="digit">(</button></td>
                <td><button class="digit">)</button></td>
            </tr>
            <tr>
                <td><button class="digit">9</button></td>
                <td><button class="digit">8</button></td>
                <td><button class="digit">7</button></td>
                <td><button class="operators">*</button></td>
            </tr>
            <tr>
                <td><button class="digit">9</button></td>
                <td><button class="digit">8</button></td>
                <td><button class="digit">7</button></td>
                <td><button class="operators">*</button></td>
            </tr>
            <tr>
                <td><button class="digit">6</button></td>
                <td><button class="digit">5</button></td>
                <td><button class="digit">4</button></td>
                <td><button class="operators">/</button></td>
            </tr>
            <tr>
                <td><button class="digit">3</button></td>
                <td><button class="digit">2</button></td>
                <td><button class="digit">1</button></td>
                <td><button class="operators">-</button></td>
            </tr>
            <tr>
                <td><button id="dot">.</button></td>
                <td><button class="digit">0</button></td>
                <td><button class="special" id="equal">=</button></td>
                <td><button class="operators">+</button></td>
            </tr>
        </table>
    </div>
</body>
</html>
