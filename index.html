<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>

    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <div class="content-box">
        <div class="screen">
            <div class="count">teste</div>
            <div class="result">version 0.1</div>
        </div>
        <table class="buttons">
            <tr>
                <td><button class="btn btn-clear" id="delete">AC</button>
                <td><button class="btn btn-prctg">%</button></td>
                <td><button class="btn btn-sqrt">rx</button></td>
                <td><button class="btn btn-pow">px</button></td>
            </tr>

            <tr>
                <td><button class="btn btn-num">7</button></td>
                <td><button class="btn btn-num">8</button></td>
                <td><button class="btn btn-num">9</button></td>
                <td><button class="btn btn-op">*</button></td>
            </tr>
            <tr>
                <td><button class="btn btn-num">4</button></td>
                <td><button class="btn btn-num">5</button></td>
                <td><button class="btn btn-num">6</button></td>
                <td><button class="btn btn-op">/</button></td>
            </tr>
            <tr>
                <td><button class="btn btn-num">1</button></td>
                <td><button class="btn btn-num">2</button></td>
                <td><button class="btn btn-num">3</button></td>
                <td><button class="btn btn-op">-</button></td>
            </tr>
            <tr>
                <td><button class="btn btn-num">.</button></td>
                <td><button class="btn btn-num">0</button></td>
                <td><button class="btn btn-result">=</button></td>
                <td><button class="btn btn-op">+</button></td>
            </tr>
        </table>
    </div>
    <script src="./scripts/main.js"></script>
</body>
</html>
